<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="20%" y1="20%" x2="80%" y2="80%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#e04000"/>
    </linearGradient>
    <linearGradient id="questionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e0e0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="3"/>
      <feComposite operator="out" in="SourceGraphic"/>
      <feFlood flood-color="#000" flood-opacity="0.3"/>
      <feComposite operator="in" in2="A"/>
      <feComposite operator="over" in2="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bgGrad)"/>

  <!-- Subtle court line accents -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="3"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="2"/>

  <!-- Basketball body -->
  <circle cx="256" cy="240" r="155" fill="url(#ballGrad)" filter="url(#innerShadow)"/>

  <!-- Basketball seam lines -->
  <path d="M 101 240 Q 256 200 411 240" fill="none" stroke="#c43400" stroke-width="5" stroke-linecap="round"/>
  <path d="M 101 240 Q 256 280 411 240" fill="none" stroke="#c43400" stroke-width="5" stroke-linecap="round"/>
  <line x1="256" y1="85" x2="256" y2="395" stroke="#c43400" stroke-width="5" stroke-linecap="round"/>

  <!-- Pebble texture hint -->
  <circle cx="200" cy="180" r="2" fill="#d45520" opacity="0.4"/>
  <circle cx="310" cy="200" r="2" fill="#d45520" opacity="0.4"/>
  <circle cx="220" cy="300" r="2" fill="#d45520" opacity="0.4"/>
  <circle cx="290" cy="160" r="2" fill="#d45520" opacity="0.4"/>
  <circle cx="180" cy="260" r="2" fill="#d45520" opacity="0.4"/>
  <circle cx="330" cy="280" r="2" fill="#d45520" opacity="0.4"/>

  <!-- Question mark - bold and centered -->
  <g filter="url(#glow)">
    <text x="256" y="295" text-anchor="middle" font-family="'Georgia', 'Times New Roman', serif" font-size="220" font-weight="900" font-style="italic" fill="url(#questionGrad)" opacity="0.95">?</text>
  </g>

  <!-- Small sparkle accents for "what if" magic -->
  <g fill="#ffd700" opacity="0.8">
    <polygon points="420,80 425,95 440,95 428,105 432,120 420,110 408,120 412,105 400,95 415,95" />
    <polygon points="100,370 103,379 112,379 105,385 107,394 100,388 93,394 95,385 88,379 97,379" transform="scale(0.8) translate(15, 55)"/>
  </g>

  <!-- "WHAT IF" text bar at bottom -->
  <rect x="130" y="405" width="252" height="44" rx="22" ry="22" fill="#ff6b35" opacity="0.9"/>
  <text x="256" y="435" text-anchor="middle" font-family="'Impact', 'Arial Black', sans-serif" font-size="28" fill="#ffffff" letter-spacing="4" font-weight="bold">WHAT IF?</text>
</svg>
